<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>ML Pitch Chooser</title>
        <link rel="stylesheet" type="text/css" href="./src/ui/styling.css">

        <script type="module">
            let exports = {};
            import { main } from "./dist/main.js";
            window.main = main;
        </script>
    </head>

    <body onload="main()">
        <div class="header-div">
            <h1>Pitch Chooser AI</h1>
        </div>

        <div class="button-div">
            <button id="ball">Ball</button>
            <button id="strike">Strike</button>
            <button id="foul">Foul</button>
            <br>

            <button id="1b">1b</button>
            <button id="2b">2b</button>
            <button id="3b">3b</button>
            <button id="hr">HR</button>
            <br>

            <button id="error">Error</button>
            <button id="go">GO</button>
            <button id="lo">LO</button>
            <button id="fo">FO</button>
            <br>

            <button id="dp">DP</button>
            <button id="undo">Undo</button>
        </div>

        <div class="scorebug">

        </div>

        <div class="batter-pitcher">

        </div>

        <div class="next-pitch">

        </div>
        
        <script type="module" src="./dist/main.js"></script>

        <script type="module" src="./dist/utils/usingNode.js"></script>
        <script type="module" src="./dist/utils/files.js"></script>
        <script type="module" src="./dist/utils/LinkedList.js"></script>
        <script type="module" src="./dist/utils/random.js"></script>
        <script type="module" src="./dist/utils/utilities.js"></script>

        <script type="module" src="./dist/baseballLogic/GameState.js"></script>
        <script type="module" src="./dist/baseballLogic/Pitcher.js"></script>

        <script type="module" src="./dist/ml/mappings.js"></script>
        <script type="module" src="./dist/ml/nextPitch.js"></script>
        <script type="module" src="./dist/ml/parseData.js"></script>
        <script type="module" src="./dist/ml/ReinforcementLearning.js"></script>

        <script type="module" src="./dist/ui/buttons.js"></script>
        <script type="module" src="./dist/ui/scorebug.js"></script>
    </body>
</html>
