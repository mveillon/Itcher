<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>ML Pitch Chooser</title>
        <link rel="stylesheet" type="text/css" href="./src/ui/styling.css">
        <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
        <script src="./builds/mainBundle.js"></script>
        <script src="./builds/buttonBundle.js"></script>
        <script src="./builds/scorebugBundle.js"></script>
    </head>

    <body onload="Main.init()">
        <div class="header-div">
            <h1>Pitch Chooser AI</h1>
        </div>

        <div class="parent">
            <div class="col-parent">
                <div class="button-div">
                    <div class="button-row">
                        <button type="button" onclick="Buttons.ball()" class="event-button">Ball</button>
                        <button type="button" onclick="Buttons.strike()" class="event-button">Strike</button>
                        <button type="button" onclick="Buttons.foul()" class="event-button">Foul</button>
                    </div>

                    <div class="button-row">
                        <button type="button" onclick="Buttons.single()" class="event-button">1b</button>
                        <button type="button" onclick="Buttons.double()" class="event-button">2b</button>
                        <button type="button" onclick="Buttons.triple()" class="event-button">3b</button>
                        <button type="button" onclick="Buttons.homeRun()" class="event-button">HR</button>
                    </div>

                    <div class="button-row">
                        <button type="button" onclick="Buttons.error()" class="event-button">Error</button>
                        <button type="button" onclick="Buttons.groundout()" class="event-button">GO</button>
                        <button type="button" onclick="Buttons.lineout()" class="event-button">LO</button>
                        <button type="button" onclick="Buttons.flyout()" class="event-button">FO</button>
                    </div>

                    <div class="button-row">
                        <button type="button" onclick="Buttons.doublePlay()" class="event-button">DP</button>
                        <button type="button" onclick="Buttons.undo()" class="event-button">Undo</button>
                    </div>
                </div>

                <div class="scorebug">
                    <div class="bug-buttons">
                        <div class="bases">
                            <input type="image" onclick="Scorebug.toggleBase(2)" src="./assets/empty.png" class="base" id="third-base" />
                            <input type="image" onclick="Scorebug.toggleBase(1)" src="./assets/empty.png" class="base" id="second-base" />
                            <input type="image" onclick="Scorebug.toggleBase(0)" src="./assets/empty.png" class="base" id="first-base" />
                        </div>
                        
                        <div class="outs">
                            <input type="image" onclick="Scorebug.toggleOuts(0)" src="./assets/no-out.png" class="out" id="one-out" />
                            <input type="image" onclick="Scorebug.toggleOuts(1)" src="./assets/no-out.png" class="out" id="two-out" />
                            <input type="image" onclick="Scorebug.toggleOuts(2)" src="./assets/no-out.png" class="out" id="three-out" />
                        </div>
                    </div>
        
                    <div class="count">
                        <div class="change-count">
                            <img src="./assets/inc.png" class="ball-button" onclick="Scorebug.addBall(1)" />
                            <img src="./assets/inc.png" class="strike-button" onclick="Scorebug.addStrike(1)" />
                        </div>

                        <p class="count-text" id="count-text"></p>

                        <div class="change-count">
                            <img src="./assets/dec.png" class="ball-button" onclick="Scorebug.addBall(-1)" />
                            <img src="./assets/dec.png" class="strike-button" onclick="Scorebug.addStrike(-1)" />
                        </div>
                    </div>
                </div>
            </div>

            <div class="next-pitch">

            </div>
        </div>
    </body>
</html>
