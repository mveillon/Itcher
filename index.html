<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>ML Pitch Chooser</title>
        <link rel="stylesheet" type="text/css" href="./src/ui/styling.css">
        <script src="bundle.js"></script>
    </head>

    <body onload="pitchChooser.init()">
        <div class="header-div">
            <h1>Pitch Chooser AI</h1>
        </div>

        <div class="button-div">
            <button id="ball">Ball</button>
            <button id="strike">Strike</button>
            <button id="foul">Foul</button>
            <br>

            <button id="1b">1b</button>
            <button id="2b">2b</button>
            <button id="3b">3b</button>
            <button id="hr">HR</button>
            <br>

            <button id="error">Error</button>
            <button id="go">GO</button>
            <button id="lo">LO</button>
            <button id="fo">FO</button>
            <br>

            <button id="dp">DP</button>
            <button id="undo">Undo</button>
        </div>

        <div class="scorebug">
            <div class="bases">
                <input type="image" src="./assets/empty.png" id="third-base" class="base" />
                <input type="image" src="./assets/empty.png" id="second-base" class="base" />
                <input type="image" src="./assets/empty.png" id="first-base" class="base" />
            </div>

            <div class="outs">
                <input type="image" src="./assets/no-out.png" id="one-out" class="out" />
                <input type="image" src="./assets/no-out.png" id="two-out" class="out" />
                <input type="image" src="./assets/no-out.png" id="three-out" class="out" />
            </div>

            <div class="count">
                <input type="strikes" class="count-input" />
                <p class="count-dash">-</p>
                <input type="balls" class="count-input" />
            </div>
        </div>

        <div class="batter-pitcher">

        </div>

        <div class="next-pitch">

        </div>

    </body>
</html>
