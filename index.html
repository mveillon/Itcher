<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>ML Pitch Chooser</title>

        <link rel="stylesheet" type="text/css" href="./src/ui/styles/button.css">
        <link rel="stylesheet" type="text/css" href="./src/ui/styles/input.css">
        <link rel="stylesheet" type="text/css" href="./src/ui/styles/main.css">
        <link rel="stylesheet" type="text/css" href="./src/ui/styles/scorebug.css">
        <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">

        <script src="./builds/mainBundle.js"></script>
    </head>

    <body onload="Main.init()">
        <div class="header-div">
            <h1>Pitch Chooser AI</h1>
        </div>

        <div class="parent">
            <div class="col-parent">
                <div class="button-div">
                    <div class="button-row">
                        <button type="button" onclick="Main.ball()" class="event-button">Ball</button>
                        <button type="button" onclick="Main.strike()" class="event-button">Strike</button>
                        <button type="button" onclick="Main.foul()" class="event-button">Foul</button>
                    </div>

                    <div class="button-row">
                        <button type="button" onclick="Main.single()" class="event-button">1b</button>
                        <button type="button" onclick="Main.double()" class="event-button">2b</button>
                        <button type="button" onclick="Main.triple()" class="event-button">3b</button>
                        <button type="button" onclick="Main.homeRun()" class="event-button">HR</button>
                    </div>

                    <div class="button-row">
                        <button type="button" onclick="Main.error()" class="event-button">Error</button>
                        <button type="button" onclick="Main.groundout()" class="event-button">GO</button>
                        <button type="button" onclick="Main.lineout()" class="event-button">LO</button>
                        <button type="button" onclick="Main.flyout()" class="event-button">FO</button>
                    </div>

                    <div class="button-row">
                        <button type="button" onclick="Main.doublePlay()" class="event-button">DP</button>
                        <button type="button" onclick="Main.undo()" class="event-button">Undo</button>
                    </div>
                </div>

                <div class="scorebug">
                    <div class="bug-buttons">
                        <div class="bases">
                            <input type="image" onclick="Main.toggleBase(2)" src="./assets/empty.png" class="base" id="third-base" />
                            <input type="image" onclick="Main.toggleBase(1)" src="./assets/empty.png" class="base" id="second-base" />
                            <input type="image" onclick="Main.toggleBase(0)" src="./assets/empty.png" class="base" id="first-base" />
                        </div>
                        
                        <div class="outs">
                            <input type="image" onclick="Main.toggleOuts(0)" src="./assets/no-out.png" class="out" id="one-out" />
                            <input type="image" onclick="Main.toggleOuts(1)" src="./assets/no-out.png" class="out" id="two-out" />
                            <input type="image" onclick="Main.toggleOuts(2)" src="./assets/no-out.png" class="out" id="three-out" />
                        </div>
                    </div>
        
                    <div class="count">
                        <div class="change-count">
                            <img src="./assets/inc.png" class="ball-button" onclick="Main.addBall(1)" />
                            <img src="./assets/inc.png" class="strike-button" onclick="Main.addStrike(1)" />
                        </div>

                        <p class="count-text" id="count-text"></p>

                        <div class="change-count">
                            <img src="./assets/dec.png" class="ball-button" onclick="Main.addBall(-1)" />
                            <img src="./assets/dec.png" class="strike-button" onclick="Main.addStrike(-1)" />
                        </div>
                    </div>
                </div>
            </div>

            <div class="inputs">
                <div class="pitcher">
                    <button onclick="Main.toggleDropdown()" class="pitcher-button" id="drop-button"></button>
                    <div id="pitcher-dropdown" class="dropdown-content">
                        <input type="text" id="pitcher-input" class="pitcher-input" onkeyup="Main.filterPitcher()">
                    </div>
                </div>

                <div class="lineup">
                    <button class="lineup-button" id="lineup-button" onclick="Main.toggleShowLineup()"></button>
                    <div class="change-lineup" id="change-lineup">
                        <input type="text" class="lineup-text" id="lineup-text">
                    </div>
                </div>

                <div class="linespot">
                    <p class="linespot-text">At bat:</p>
                    <input class="change-linespot" id="change-linespot" type="text">
                </div>
            </div>
        </div>
    </body>
</html>
